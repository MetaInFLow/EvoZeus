<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EvoZeus banner</title>
  <desc id="desc">A banner for EvoZeus, the agent work pattern evolution layer.</desc>
  <rect width="1200" height="360" rx="28" fill="#F8F6F0"/>
  <rect x="28" y="28" width="1144" height="304" rx="22" fill="#FFFFFF" stroke="#1F2937" stroke-width="3"/>
  <path d="M150 84H1050" stroke="#C2410C" stroke-width="8" stroke-linecap="round"/>
  <path d="M150 276H1050" stroke="#1F2937" stroke-width="3" stroke-linecap="round" stroke-dasharray="14 16"/>

