name: EvoZeus Privacy Scan

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  privacy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
      - name: Scan PR diff for sensitive evidence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVOZEUS_DRY_RUN: "1"
          EVOZEUS_ENFORCE_PRIVACY: "0"
        run: node scripts/github/privacy-scan.mjs
