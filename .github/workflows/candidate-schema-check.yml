name: EvoZeus Candidate Schema Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  candidate-schema-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
      - name: Install Node dependencies
        run: npm ci
      - name: Run governance gate unit tests
        run: npm run test:github-gates
      - name: Validate candidate JSON and schemas
        run: node scripts/github/candidate-schema-check.mjs
