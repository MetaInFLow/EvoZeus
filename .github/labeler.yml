type:code:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**"
          - "tests/**"
          - "scripts/**"

type:candidate:
  - changed-files:
      - any-glob-to-any-file:
          - "candidates/**"
          - "examples/valid-candidates/**"
          - "examples/invalid-candidates/**"

type:schema:
  - changed-files:
      - any-glob-to-any-file:
          - "schemas/**"

type:skill-instruction:
  - changed-files:
      - any-glob-to-any-file:
          - "SKILL.md"
          - "skills/**"

type:governance:
  - changed-files:
      - any-glob-to-any-file:
          - "CONTRIBUTING.md"
          - "CODE_OF_CONDUCT.md"
          - "ZEUS_STATUS.yml"
          - "docs/governance/**"
          - "docs/rfcs/**"
          - ".github/CODEOWNERS"
          - ".github/PULL_REQUEST_TEMPLATE/**"
          - ".github/ISSUE_TEMPLATE/**"

type:workflow:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - "scripts/github/**"
