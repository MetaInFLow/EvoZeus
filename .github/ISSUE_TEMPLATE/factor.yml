name: Propose a Factor
description: Propose a reusable judgment factor.
title: "[Factor]: "
labels:
  - factor
  - needs-review
body:
  - type: markdown
    attributes:
      value: |
        This issue proposes a Factor Candidate for the public `EvoZeus` intake.
        Do not upload raw session logs, private code, secrets, customer data, or executable scanner code here.
        Maintainers may route pack or scanner work to `evozeus-factor-lab`; official releases come from `evozeus-factors-official`.
  - type: input
    id: name
    attributes:
      label: Factor name
      placeholder: tool_path_resolution
    validations:
      required: true
  - type: textarea
    id: trigger
    attributes:
      label: Trigger
      description: When should this factor run?
      placeholder: When an Agent concludes a CLI is missing, unavailable, or unauthenticated.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Required evidence
      description: What evidence should support this factor?
      placeholder: which output, PATH, common install paths, version command, auth status, retry logs.
    validations:
      required: true
  - type: textarea
    id: verdicts
    attributes:
      label: Possible verdicts
      placeholder: Fix Environment, Keep as Habit, Promote to Skill.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Example sessions
      description: Link issues, PRs, or redacted examples.
    validations:
      required: false
